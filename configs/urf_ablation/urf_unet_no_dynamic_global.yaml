data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: structure
  threshold: 0.5
experiment:
  output_root: outputs_urf_ablation
  name: urf_unet_no_dynamic_global
train:
  aux_loss_weight: 0.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  epochs: 60
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: structure
  lr: 0.0001
  mixed_precision: true
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 60
  threshold: 0.5
  weight_decay: 0.0001
  use_aux_outputs_loss: true
  use_boundary_loss: true
  gradient_accumulation_steps: 1
  aux_output_weights:
  - 0.2
  aux_loss: structure
  boundary_loss: bce_dice
  boundary_weight: 0.2
model:
  name: urf_unet_no_dynamic_global
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  norm: bn
  act: relu
  urf_global_mode: plain
  urf_global_alpha: 0.25
  urf_global_alpha_start: 0.0
  urf_global_alpha_warmup_epochs: 10
  urf_global_expansion: 1.25
  urf_global_dropout: 0.05
  urf_global_num_bands: 4
  urf_global_amplitude_scale: 0.35
  urf_global_phase_max: 0.0
  urf_global_use_channel_mixing: true
  fourier_init_hw:
  - 22
  - 22
  fourier_amplitude_scale: 0.35
  fourier_phase_max: 0.7853981633974483
  urf_use_local_refiner: true
  urf_use_uncertainty: true
  urf_local_decoder_index: 1
  urf_local_alpha: 0.2
  urf_local_alpha_start: 0.0
  urf_local_alpha_warmup_epochs: 10
  urf_local_window_size: 8
  urf_local_num_bands: 3
  urf_local_response_scale: 0.35
  urf_routing_floor: 0.1
  urf_local_dropout: 0.05
  urf_return_boundary: true
notes:
  purpose: Tests uncertainty-routed local refinement with a static plain global Fourier
    block.
