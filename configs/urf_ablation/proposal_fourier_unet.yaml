data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: structure
  threshold: 0.5
experiment:
  output_root: outputs_urf_ablation
  name: proposal_fourier_unet
train:
  aux_loss_weight: 0.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  epochs: 60
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: structure
  lr: 0.0001
  mixed_precision: true
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 60
  threshold: 0.5
  weight_decay: 0.0001
  use_aux_outputs_loss: false
  use_boundary_loss: false
  gradient_accumulation_steps: 1
model:
  name: proposal_fourier_unet
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  fourier_alpha: 0.25
  fourier_alpha_start: 0.0
  fourier_alpha_warmup_epochs: 10
  fourier_expansion: 1.25
  fourier_dropout: 0.05
  fourier_block_norm: gn
  fourier_block_act: gelu
  fourier_init_hw:
  - 22
  - 22
  fourier_amplitude_scale: 0.35
  fourier_phase_max: 0.7853981633974483
  fourier_use_amplitude: true
  fourier_use_phase: true
  fourier_use_channel_mixing: true
  fourier_residual: true
  fourier_zero_init_output: true
  norm: bn
  act: relu
  decoder_use_cbam: false
notes:
  purpose: Controlled plain Fourier U-Net baseline.
