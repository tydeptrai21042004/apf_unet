data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: bce_dice
  threshold: 0.5
experiment:
  output_root: outputs_paper_fair
  name: fourier_unet_plain
train:
  aux_loss_weight: 0.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  epochs: 30
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: bce_dice
  lr: 0.0003
  mixed_precision: false
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 30
  threshold: 0.5
  weight_decay: 0.0001
  use_aux_outputs_loss: false
  use_boundary_loss: false
  gradient_accumulation_steps: 1
model:
  name: fourier_unet_plain
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  apf_alpha: 0.5
  apf_alpha_start: 0.5
  apf_alpha_warmup_epochs: 0
  apf_expansion: 1.5
  apf_dropout: 0.1
  apf_block_norm: gn
  apf_block_act: gelu
  apf_init_hw:
  - 22
  - 22
  apf_amplitude_scale: 1.0
  apf_phase_max: 3.141592653589793
  apf_use_amplitude: true
  apf_use_phase: true
  apf_zero_init_output: true
  norm: bn
  act: relu
  decoder_use_cbam: false
